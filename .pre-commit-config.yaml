repos:
  - repo: local
    hooks:
      - id: harness-fix
        name: auto-fix
        entry: agent-harness fix
        language: system
        pass_filenames: false
        always_run: true

      - id: harness-lint
        name: agent-harness lint
        entry: agent-harness lint
        language: system
        pass_filenames: false
        always_run: true

      - id: jscpd
        name: jscpd (copy-paste detection)
        entry: pnpm lint:jscpd
        language: system
        pass_filenames: false
        always_run: true

      - id: actionlint
        name: actionlint (GitHub Actions)
        entry: pnpm lint:actions
        language: system
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$
